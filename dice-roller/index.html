<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyDice - 3D Dice Roller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
            overflow-x: hidden;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.4);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            font-size: 1.2rem;
            color: #f39c12;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 8px;
        }
        .roll-history { flex: 1; overflow-y: auto; }
        .roll-entry {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }
        .roll-entry .roll-info {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 6px;
        }
        .roll-entry .dice-type { color: #3498db; font-weight: 600; }
        .roll-entry .result { font-size: 1.3rem; font-weight: bold; color: #2ecc71; }
        .roll-entry .total { color: #f39c12; font-weight: bold; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: #888; margin-top: 5px; font-size: 1.1rem; }
        #dice-canvas {
            width: 100%;
            max-width: 800px;
            height: 500px;
            border-radius: 20px;
            background: radial-gradient(ellipse at center, #2a2a4a 0%, #1a1a2e 100%);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6), inset 0 0 80px rgba(255,255,255,0.03);
        }
        .controls { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; max-width: 800px; }
        .control-group {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 18px 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }
        .dice-count { display: flex; gap: 10px; }
        .dice-count button {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .dice-count button:hover, .dice-count button.active {
            border-color: #f39c12;
            background: #f39c12;
            color: #000;
        }
        .dice-type-select { display: flex; gap: 10px; }
        .dice-type-select button {
            padding: 10px 16px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .dice-type-select button:hover, .dice-type-select button.active {
            border-color: #3498db;
            background: #3498db;
            color: #fff;
        }
        .color-picker { display: flex; gap: 12px; align-items: center; }
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn:hover, .color-btn.active {
            border-color: #fff;
            transform: scale(1.2);
        }
        .action-buttons { display: flex; gap: 20px; margin-top: 30px; }
        .btn {
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-roll {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #fff;
            box-shadow: 0 6px 25px rgba(243, 156, 18, 0.5);
        }
        .btn-roll:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(243, 156, 18, 0.6); }
        .btn-roll:active { transform: translateY(0); }
        .btn-roll:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-reset {
            background: rgba(255,255,255,0.1);
            color: #888;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .btn-reset:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .roll-result {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #f39c12;
            opacity: 0;
            transition: opacity 0.4s;
            text-align: center;
        }
        .roll-result.show { opacity: 1; }
        .keyboard-hint { margin-top: 12px; font-size: 0.85rem; color: #666; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); max-height: 220px; }
            #dice-canvas { height: 350px; }
            .controls { gap: 12px; }
            .control-group { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Roll History</h2>
            <div class="roll-history" id="rollHistory">
                <div style="color: #555; text-align: center; padding: 30px;">No rolls yet</div>
            </div>
        </div>
        <div class="main">
            <div class="header">
                <h1>PolyDice</h1>
                <p>3D Dice Roller for Enthusiasts & Gamers</p>
            </div>
            <div id="dice-canvas"></div>
            <div class="controls">
                <div class="control-group">
                    <label>Number of Dice</label>
                    <div class="dice-count" id="diceCount">
                        <button data-count="1">1</button>
                        <button data-count="2">2</button>
                        <button data-count="3">3</button>
                        <button data-count="4">4</button>
                        <button data-count="5">5</button>
                        <button data-count="6" class="active">6</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Dice Type</label>
                    <div class="dice-type-select" id="diceType">
                        <button data-type="4">D4</button>
                        <button data-type="6" class="active">D6</button>
                        <button data-type="8">D8</button>
                        <button data-type="10">D10</button>
                        <button data-type="12">D12</button>
                        <button data-type="20">D20</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Dice Color</label>
                    <div class="color-picker" id="colorPicker">
                        <button class="color-btn active" data-color="#e74c3c" style="background: #e74c3c;"></button>
                        <button class="color-btn" data-color="#3498db" style="background: #3498db;"></button>
                        <button class="color-btn" data-color="#2ecc71" style="background: #2ecc71;"></button>
                        <button class="color-btn" data-color="#9b59b6" style="background: #9b59b6;"></button>
                        <button class="color-btn" data-color="#f39c12" style="background: #f39c12;"></button>
                        <button class="color-btn" data-color="#1abc9c" style="background: #1abc9c;"></button>
                        <button class="color-btn" data-color="#ecf0f1" style="background: #ecf0f1;"></button>
                        <input type="color" id="customColor" value="#e74c3c" style="width:40px;height:40px;border:none;cursor:pointer;border-radius:50%;">
                    </div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-roll" id="rollBtn">Roll</button>
                <button class="btn btn-reset" id="resetBtn">Reset</button>
            </div>
            <div class="roll-result" id="rollResult"></div>
            <div class="keyboard-hint">Press SPACE to roll</div>
        </div>
    </div>

    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>
    <script>
        // Configuration
        const DICE_SCALE = 1.8;
        const GRAVITY = -0.012;
        const BOUNCE_DAMPING = 0.7;
        const FLOOR_Y = -1.5;
        const SETTLE_THRESHOLD = 0.03;

        let scene, camera, renderer, controls;
        let dice = [];
        let diceCount = 6;
        let diceType = 6;
        let diceColor = 0xe74c3c;
        let rollHistory = [];
        let isRolling = false;
        let rollTimeout = null;
        let settlingDice = [];

        // D6 face values and local normals
        const D6_FACES = [
            { value: 1, normal: new THREE.Vector3(0, 1, 0) },   // top (+Y)
            { value: 6, normal: new THREE.Vector3(0, -1, 0) },  // bottom (-Y)
            { value: 3, normal: new THREE.Vector3(1, 0, 0) },   // right (+X)
            { value: 4, normal: new THREE.Vector3(-1, 0, 0) },  // left (-X)
            { value: 2, normal: new THREE.Vector3(0, 0, 1) },   // front (+Z)
            { value: 5, normal: new THREE.Vector3(0, 0, -1) }   // back (-Z)
        ];

        function init() {
            const canvas = document.getElementById('dice-canvas');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // Camera
            camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 12);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            canvas.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1;
            controls.minDistance = 8;
            controls.maxDistance = 35;

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(10, 20, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 100;
            mainLight.shadow.camera.left = -20;
            mainLight.shadow.camera.right = 20;
            mainLight.shadow.camera.top = 20;
            mainLight.shadow.camera.bottom = -20;
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
            fillLight.position.set(-10, 10, -10);
            scene.add(fillLight);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(40, 40);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a2e,
                roughness: 0.9,
                metalness: 0.1
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = FLOOR_Y;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid
            const grid = new THREE.GridHelper(40, 40, 0x333355, 0x222244);
            grid.position.y = FLOOR_Y + 0.01;
            scene.add(grid);

            // Window resize
            window.addEventListener('resize', () => {
                const w = canvas.clientWidth;
                const h = canvas.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            animate();
        }

        function createDie(type, color) {
            let geometry, material;
            
            if (type === 6) {
                // D6 with pip textures on faces
                geometry = new THREE.BoxGeometry(DICE_SCALE, DICE_SCALE, DICE_SCALE);
                
                // Create face materials with pips
                const materials = [];
                const pipPatterns = [
                    [2], // face 0: value 1 (top) - center pip
                    [0,1,2,3,4], // face 1: value 6 (bottom) - all pips
                    [0,4], // face 2: value 3 (right)
                    [1,3], // face 3: value 4 (left)
                    [0,2,4], // face 4: value 2 (front)
                    [1,2,3] // face 5: value 5 (back)
                ];
                
                const pipSize = 32;
                const positions = [
                    [64, 64], [192, 64], [64, 192], [192, 192], [128, 128]
                ];
                
                for (let f = 0; f < 6; f++) {
                    const can = document.createElement('canvas');
                    can.width = 256;
                    can.height = 256;
                    const ctx = can.getContext('2d');
                    
                    // White face
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, 256, 256);
                    
                    // Draw pips
                    ctx.fillStyle = '#111111';
                    const pips = pipPatterns[f];
                    
                    if (pips.length === 1) {
                        ctx.beginPath();
                        ctx.arc(128, 128, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (pips.length === 2) {
                        ctx.beginPath();
                        ctx.arc(64, 64, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(192, 192, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (pips.length === 3) {
                        ctx.beginPath();
                        ctx.arc(64, 64, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(128, 128, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(192, 192, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (pips.length === 4) {
                        ctx.beginPath();
                        ctx.arc(64, 64, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(192, 64, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(64, 192, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(192, 192, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (pips.length === 5) {
                        ctx.beginPath();
                        ctx.arc(64, 64, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(192, 64, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(128, 128, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(64, 192, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(192, 192, pipSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    const texture = new THREE.CanvasTexture(can);
                    texture.colorSpace = THREE.SRGBColorSpace;
                    materials.push(new THREE.MeshStandardMaterial({ 
                        map: texture,
                        roughness: 0.3,
                        metalness: 0.1
                    }));
                }
                
                const die = new THREE.Mesh(geometry, materials);
                die.castShadow = true;
                die.userData = { type: 6, velocity: new THREE.Vector3(), angularVel: new THREE.Vector3() };
                return die;
            } else {
                // Polyhedral dice (D4, D8, D10, D12, D20)
                let geo;
                switch(type) {
                    case 4: geo = new THREE.TetrahedronGeometry(DICE_SCALE * 0.9); break;
                    case 8: geo = new THREE.OctahedronGeometry(DICE_SCALE * 0.85); break;
                    case 10: geo = new THREE.DodecahedronGeometry(DICE_SCALE * 0.8); break;
                    case 12: geo = new THREE.DodecahedronGeometry(DICE_SCALE * 0.85); break;
                    case 20: geo = new THREE.IcosahedronGeometry(DICE_SCALE * 0.85); break;
                    default: geo = new THREE.BoxGeometry(DICE_SCALE, DICE_SCALE, DICE_SCALE);
                }
                
                material = new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.3,
                    metalness: 0.2
                });
                
                const die = new THREE.Mesh(geo, material);
                die.castShadow = true;
                die.userData = { type: type, velocity: new THREE.Vector3(), angularVel: new THREE.Vector3() };
                return die;
            }
        }

        function clearDice() {
            dice.forEach(d => scene.remove(d));
            dice = [];
        }

        function spawnDice() {
            clearDice();
            
            const spread = diceCount > 1 ? 2.5 : 0;
            for (let i = 0; i < diceCount; i++) {
                const die = createDie(diceType, diceColor);
                
                die.position.x = (Math.random() - 0.5) * spread;
                die.position.y = 6;
                die.position.z = (Math.random() - 0.5) * spread;
                
                die.rotation.x = Math.random() * Math.PI * 2;
                die.rotation.y = Math.random() * Math.PI * 2;
                die.rotation.z = Math.random() * Math.PI * 2;
                
                // Upward throw
                die.userData.velocity.set(
                    (Math.random() - 0.5) * 0.3,
                    0.3,
                    (Math.random() - 0.5) * 0.3
                );
                
                // Stronger spin
                die.userData.angularVel.set(
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6
                );
                
                dice.push(die);
                scene.add(die);
            }
        }

        function updatePhysics() {
            dice.forEach(die => {
                if (die.userData.settling) return;
                
                const vel = die.userData.velocity;
                const angVel = die.userData.angularVel;
                
                // Apply gravity
                vel.y += GRAVITY;
                
                // Update position
                die.position.add(vel);
                
                // Update rotation
                die.rotation.x += angVel.x;
                die.rotation.y += angVel.y;
                die.rotation.z += angVel.z;
                
                // Floor collision
                const halfSize = DICE_SCALE / 2;
                const bottom = die.position.y - halfSize;
                
                if (bottom < FLOOR_Y) {
                    die.position.y = FLOOR_Y + halfSize;
                    vel.y = -vel.y * BOUNCE_DAMPING;
                    angVel.multiplyScalar(0.8);
                    
                    // Friction on floor
                    vel.x *= 0.85;
                    vel.z *= 0.85;
                    angVel.x *= 0.7;
                    angVel.z *= 0.7;
                }
                
                // Wall bounds
                const bound = 7;
                if (Math.abs(die.position.x) > bound) {
                    die.position.x = Math.sign(die.position.x) * bound;
                    vel.x = -vel.x * 0.5;
                }
                if (Math.abs(die.position.z) > bound) {
                    die.position.z = Math.sign(die.position.z) * bound;
                    vel.z = -vel.z * 0.5;
                }
                
                // Ceiling
                if (die.position.y > 15) {
                    die.position.y = 15;
                    vel.y = -vel.y * 0.5;
                }
                
                // Check if should enter settling phase - only when ON the floor
                if (bottom <= FLOOR_Y + 0.2 && vel.length() < 0.06 && angVel.length() < 0.06) {
                    die.userData.settling = true;
                    die.userData.settleT = 0;
                }
            });
        }

        function isSettled() {
            return dice.every(die => {
                if (die.userData.settling) {
                    die.userData.settleT += 0.04;
                    // Smooth rotation to flat
                    const targetRX = Math.round(die.rotation.x / (Math.PI * 0.5)) * (Math.PI * 0.5);
                    const targetRZ = Math.round(die.rotation.z / (Math.PI * 0.5)) * (Math.PI * 0.5);
                    die.rotation.x += (targetRX - die.rotation.x) * 0.15;
                    die.rotation.z += (targetRZ - die.rotation.z) * 0.15;
                    
                    if (die.userData.settleT >= 1) {
                        die.rotation.x = targetRX;
                        die.rotation.z = targetRZ;
                        die.userData.settling = false;
                    }
                    return false;
                }
                return true;
            });
        }

        function getTopFace(die) {
            if (die.userData.type !== 6) {
                // For non-D6, return random value
                return Math.floor(Math.random() * die.userData.type) + 1;
            }
            
            // For D6, find which face is pointing up
            const worldUp = new THREE.Vector3(0, 1, 0);
            let maxDot = -1;
            let topFace = 1;
            
            const normalMatrix = new THREE.Matrix3().getNormalMatrix(die.matrixWorld);
            
            for (let i = 0; i < 6; i++) {
                const localNormal = D6_FACES[i].normal.clone();
                const worldNormal = localNormal.applyMatrix3(normalMatrix).normalize();
                const dot = worldNormal.dot(worldUp);
                
                if (dot > maxDot) {
                    maxDot = dot;
                    topFace = D6_FACES[i].value;
                }
            }
            
            return topFace;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isRolling && dice.length > 0) {
                updatePhysics();
                
                if (isSettled()) {
                    // Finalize roll
                    const results = dice.map(die => getTopFace(die));
                    const total = results.reduce((a, b) => a + b, 0);
                    
                    isRolling = false;
                    document.getElementById('rollBtn').disabled = false;
                    
                    const resultDiv = document.getElementById('rollResult');
                    resultDiv.innerHTML = 'Rolled: ' + results.join(' + ') + ' = <span class="total">' + total + '</span>';
                    resultDiv.classList.add('show');
                    
                    addToHistory(diceType, diceCount, results, total);
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            document.getElementById('rollBtn').disabled = true;
            document.getElementById('rollResult').classList.remove('show');
            
            spawnDice();
            
            if (rollTimeout) clearTimeout(rollTimeout);
            rollTimeout = setTimeout(() => {
                if (isRolling) {
                    isRolling = false;
                    document.getElementById('rollBtn').disabled = false;
                    
                    const results = dice.map(die => {
                        if (die.userData.type === 6) return getTopFace(die);
                        return Math.floor(Math.random() * die.userData.type) + 1;
                    });
                    const total = results.reduce((a, b) => a + b, 0);
                    
                    const resultDiv = document.getElementById('rollResult');
                    resultDiv.innerHTML = 'Rolled: ' + results.join(' + ') + ' = <span class="total">' + total + '</span>';
                    resultDiv.classList.add('show');
                    
                    addToHistory(diceType, diceCount, results, total);
                }
            }, 8000);
        }

        function addToHistory(type, count, results, total) {
            const timestamp = new Date().toLocaleTimeString();
            const entry = { type, count, results, total, timestamp };
            rollHistory.unshift(entry);
            if (rollHistory.length > 10) rollHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('rollHistory');
            if (rollHistory.length === 0) {
                container.innerHTML = '<div style="color: #555; text-align: center; padding: 30px;">No rolls yet</div>';
                return;
            }
            container.innerHTML = rollHistory.map(entry => 
                '<div class="roll-entry">' +
                    '<div>D' + entry.type + ' x ' + entry.count + ' -> <span class="result">' + entry.results.join(' + ') + '</span></div>' +
                    '<div class="roll-info">' +
                        '<span class="dice-type">Total: <span class="total">' + entry.total + '</span></span>' +
                        '<span>' + entry.timestamp + '</span>' +
                    '</div>' +
                '</div>'
            ).join('');
        }

        function resetAll() {
            if (rollTimeout) clearTimeout(rollTimeout);
            if (isRolling) {
                isRolling = false;
                document.getElementById('rollBtn').disabled = false;
            }
            clearDice();
            rollHistory = [];
            renderHistory();
            document.getElementById('rollResult').classList.remove('show');
        }

        // Event listeners
        document.getElementById('diceCount').addEventListener('click', e => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('#diceCount button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                diceCount = parseInt(e.target.dataset.count);
            }
        });

        document.getElementById('diceType').addEventListener('click', e => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('#diceType button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                diceType = parseInt(e.target.dataset.type);
            }
        });

        document.getElementById('colorPicker').addEventListener('click', e => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('#colorPicker .color-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                diceColor = parseInt(e.target.dataset.color.replace('#', '0x'));
            }
        });

        document.getElementById('customColor').addEventListener('input', e => {
            document.querySelectorAll('#colorPicker .color-btn').forEach(b => b.classList.remove('active'));
            diceColor = parseInt(e.target.value.replace('#', '0x'));
        });

        document.getElementById('rollBtn').addEventListener('click', rollDice);
        document.getElementById('resetBtn').addEventListener('click', resetAll);

        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !isRolling && !e.target.closest('input')) {
                e.preventDefault();
                rollDice();
            }
        });

        // Init
        init();
    </script>
</body>
</html>
